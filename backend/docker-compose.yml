services:
  api:
    build: .
    container_name: askrepo_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uv run uvicorn app:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips="*"
    volumes:
      - repo_data:/app/tmp
    restart: unless-stopped
  
  worker:
    build: .
    container_name: askrepo_worker
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uv run celery -A api.celery_worker.celery_app worker --loglevel=info
    volumes:
      - repo_data:/app/tmp
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: askrepo-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
  
  db:
    image: pgvector/pgvector:pg17
    container_name: askrepo-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  repo_data: